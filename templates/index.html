<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKU Dashboard</title>
    <!-- Font: TH Sarabun PSK (Local) -->
    <style>
        @font-face {
            font-family: 'TH Sarabun PSK';
            src: url('/static/fonts/THSarabunPSK.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'TH Sarabun PSK';
            src: url('/static/fonts/THSarabunPSK-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'TH Sarabun PSK';
            src: url('/static/fonts/THSarabunPSK-Italic.ttf') format('truetype');
            font-weight: normal;
            font-style: italic;
        }
        @font-face {
            font-family: 'TH Sarabun PSK';
            src: url('/static/fonts/THSarabunPSK-BoldItalic.ttf') format('truetype');
            font-weight: bold;
            font-style: italic;
        }
        body, html, .container, h2, #skuInput, #searchBtn, .result-table, .result-table th, .result-table td, .error, .loading {
            font-family: 'TH Sarabun PSK' !important;
        }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            margin: 0;
            background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 500px;
            margin: 60px auto 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 22px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            padding: 40px 32px 32px 32px;
            text-align: center;
            animation: fadeInDown 1s cubic-bezier(.39,.575,.56,1.000);
        }
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        h2 {
            color: #f76b1c;
            margin-bottom: 28px;
            font-size: 2.5em;
            letter-spacing: 1px;
            font-weight: bold;
            text-shadow: 0 2px 8px #fda08533;
            animation: fadeIn 1.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        h2 .fa-barcode {
            color: #fda085;
            font-size: 1.1em;
            animation: bounceIcon 1.2s infinite alternate;
        }
        @keyframes bounceIcon {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px) scale(1.15); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        #skuInput {
            width: 75%;
            padding: 14px 18px;
            border: 2px solid #fda085;
            border-radius: 10px;
            font-size: 1.3em;
            transition: box-shadow 0.2s, border 0.2s;
            outline: none;
            margin-bottom: 18px;
            background: #fffdfa;
            box-shadow: 0 2px 8px #fda08511;
        }
        #skuInput:focus {
            border: 2px solid #f76b1c;
            box-shadow: 0 0 12px #fda08555;
            background: #fff7e6;
        }
        #searchBtn {
            background: linear-gradient(90deg, #fda085 0%, #f6d365 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px 38px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 12px #fda08533;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        #searchBtn i {
            margin-right: 8px;
            animation: spinBtn 1.2s linear infinite;
            display: none;
        }
        #searchBtn.loading i {
            display: inline-block;
        }
        @keyframes spinBtn {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #searchBtn:hover {
            background: linear-gradient(90deg, #f6d365 0%, #fda085 100%);
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 4px 18px #fda08555;
        }
        #searchBtn:active {
            transform: scale(0.98);
        }
        .result-table {
            border-collapse: collapse;
            width: 96vw;
            min-width: 900px;
            max-width: 1400px;
            margin: 0 auto 32px auto;
            margin-top: 28px;
            background: #fff9f3;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 16px #fda08522;
            text-align: left;
            font-size: 1.3em;
            animation: fadeInUp 1.1s cubic-bezier(.39,.575,.56,1.000);
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .result-table th, .result-table td {
            border: 1px solid #fda08544;
            padding: 12px 10px;
            text-align: left;
        }
        .result-table th {
            background: linear-gradient(90deg, #fda085 0%, #f6d365 100%);
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.2em;
        }
        .result-table tr:nth-child(even) {
            background: #fff3e6;
        }
        .error {
            color: #e74c3c;
            margin-top: 24px;
            font-weight: bold;
            background: #fff0ee;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 2px 8px #e74c3c22;
            display: inline-block;
            font-size: 1.2em;
            animation: fadeIn 0.7s;
        }
        .loading {
            color: #f76b1c;
            font-weight: bold;
            margin-top: 24px;
            font-size: 1.2em;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            animation: pulse 1.2s infinite alternate;
        }
        .loading .fa-spinner {
            font-size: 1.3em;
            animation: spinBtn 1.1s linear infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        @media (max-width: 900px) {
            .result-table { min-width: 0; width: 98vw; font-size: 1.1em; }
        }
        @media (max-width: 600px) {
            .container { padding: 18px 4vw; }
            #skuInput { width: 100%; font-size: 1.1em; }
            .result-table { font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fa-solid fa-barcode"></i>อิอ้วนแม่ลูกอ่อน</h2>
        <input type="text" id="skuInput" placeholder="นิ่งเป็นหลัก ขยับเป็นแหลก" autocomplete="off" />
        <br>
        <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i>เพิ่มน้ำหนัก</button>
    </div>
    <div id="result" style="max-width:100vw;margin:32px auto 0 auto;"></div>
    <script src="/static/script.js"></script>
    <script>
    // เพิ่มลูกเล่นปุ่ม loading
    const searchBtn = document.getElementById('searchBtn');
    const skuInput = document.getElementById('skuInput');
    skuInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchBtn.click();
    });
    // ดักจับ event loading จาก script.js
    const origFetch = window.fetch;
    window.fetch = function(...args) {
        if (args[0] && args[0].toString().includes('/search')) {
            searchBtn.classList.add('loading');
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<i class="fa-solid fa-spinner"></i>กำลังลดน้ำหนัก...';
        }
        return origFetch.apply(this, args).then(res => {
            if (args[0] && args[0].toString().includes('/search')) {
                setTimeout(() => {
                    searchBtn.classList.remove('loading');
                    searchBtn.disabled = false;
                    searchBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>เพิ่มน้ำหนัก';
                }, 400); // delay เพื่อให้เห็น animation
            }
            return res;
        });
    };
    </script>
</body>
</html>
